services:

  # ─────────────────────────────────────────────
  # DATABASE  (internal only — never exposed)
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: flowsync-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-flowsync_db}
      # ── PostgreSQL Performance Tuning ──────────────────────────────────────
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=16MB
        -c maintenance_work_mem=64MB
        -c max_connections=100
        -c wal_compression=on
        -c synchronous_commit=off
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-flowsync_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - flowsync_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─────────────────────────────────────────────
  # BACKEND  →  localhost:5001
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowsync-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@db:5432/${POSTGRES_DB:-flowsync_db}?schema=public
      - PORT=5000
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
      - CLIENT_URL=${FRONTEND_URL:-http://localhost:3005}
      # ── CORS ───────────────────────────────────────────────────────────────
      # Add your production domain here when deploying
      - CORS_ORIGINS=${FRONTEND_URL:-http://localhost:3005},http://localhost:8080,http://localhost:3005,http://127.0.0.1:8080
    ports:
      - "127.0.0.1:5001:5000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - flowsync_network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  # ─────────────────────────────────────────────
  # FRONTEND  →  localhost:3005
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # MUST be relative /api — baked into JS bundle at build time.
        # If absolute (http://localhost:5000), browsers on tunnel/proxy
        # call their own localhost → all API calls fail.
        - NEXT_PUBLIC_API_URL=/api
    container_name: flowsync-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # INTERNAL_BACKEND_URL — Next.js server-side SSR / rewrite proxy inside Docker network.
      - INTERNAL_BACKEND_URL=http://backend:5000
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "127.0.0.1:3005:3000"
    networks:
      - flowsync_network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

networks:
  flowsync_network:
    driver: bridge

volumes:
  postgres_data:
